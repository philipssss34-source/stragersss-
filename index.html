<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untuk Aura</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6efe6;
      --card:#ffdce5;
      --title:#cf6478;
      --button:#e58897;
      --button-hover:#d96f84;
      --text:#7f7268;
      --stem:#e22f77;
      --dark:#2c0e16;
      --glow:rgba(255,255,255,.18);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      height:100%;
    }

    body{
      background:var(--bg);
      font-family:'Montserrat',sans-serif;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #canvas-petals{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .sakura{
      position:absolute;
      background:#ffb7c5;
      border-radius:150% 0 150% 0;
      opacity:.75;
      animation:fall linear infinite;
      filter:blur(.2px);
    }

    @keyframes fall{
      0%{ transform:translateY(-10vh) rotate(0deg); opacity:0; }
      10%{ opacity:1; }
      100%{ transform:translateY(110vh) rotate(720deg); opacity:0; }
    }

    #intro-card{
      position:relative;
      z-index:10;
      width:min(90%, 400px);
      padding:40px 28px 32px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,220,229,.96), rgba(255,230,236,.92));
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 18px 40px rgba(0,0,0,.12);
      text-align:center;
      backdrop-filter:blur(6px);
    }

    .mini-badge{
      display:inline-block;
      font-size:.78rem;
      font-weight:700;
      letter-spacing:.08em;
      color:#b85b70;
      background:rgba(255,255,255,.42);
      padding:8px 12px;
      border-radius:999px;
      margin-bottom:18px;
    }

    #intro-card h1{
      font-family:'Playfair Display',serif;
      color:var(--title);
      font-size:2.05rem;
      line-height:1.1;
      margin-bottom:14px;
    }

    #intro-card p{
      color:var(--text);
      font-size:1rem;
      line-height:1.7;
      margin-bottom:10px;
    }

    .hint{
      margin-top:10px;
      font-size:.9rem;
      color:#9c8d84;
    }

    .btn-start{
      width:100%;
      margin-top:18px;
      border:none;
      border-radius:999px;
      padding:15px 18px;
      cursor:pointer;
      color:#fff;
      font-weight:700;
      font-size:1rem;
      background:linear-gradient(180deg, var(--button), #dc7c8f);
      box-shadow:0 10px 20px rgba(229,136,151,.35);
      transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .btn-start:hover{
      background:linear-gradient(180deg, #e17b8f, var(--button-hover));
      transform:translateY(-1px);
      box-shadow:0 14px 25px rgba(229,136,151,.42);
    }

    .btn-start:active{
      transform:translateY(1px) scale(.99);
    }

    #flower-scene{
      position:fixed;
      inset:0;
      display:none;
      z-index:20;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,120,168,.10), transparent 30%),
        radial-gradient(circle at center, #3a1020 0%, #12070c 55%, #000 100%);
      overflow:hidden;
    }

    #flower-scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.12), transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,.10), transparent 2px),
        radial-gradient(circle at 40% 65%, rgba(255,255,255,.08), transparent 2px),
        radial-gradient(circle at 85% 75%, rgba(255,255,255,.12), transparent 2px);
      background-size:180px 180px;
      opacity:.35;
      pointer-events:none;
    }

    .garden{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      width:100%;
      height:60vh;
      margin-bottom:44px;
      z-index:2;
    }

    .flower{
      position:relative;
      width:86px;
      height:100%;
      margin:0 12px;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.22));
    }

    .stem{
      position:absolute;
      bottom:0;
      left:50%;
      width:6px;
      height:0;
      border-radius:10px;
      transform:translateX(-50%);
      background:linear-gradient(to top, #4a0d26, var(--stem));
      transition:2s ease-out;
    }

    .leaf{
      position:absolute;
      width:36px;
      height:20px;
      background:var(--stem);
      border-radius:0 50% 0 50%;
      opacity:0;
      transform:scale(0);
      transition:1s ease-out;
    }

    .leaf.l1{ left:-31px; top:48%; transform:rotate(-20deg) scale(0); }
    .leaf.l2{ right:-31px; top:66%; transform:rotate(20deg) scaleX(-1) scale(0); }

    .flower-head{
      position:absolute;
      bottom:100%;
      left:50%;
      transform:translate(-50%, 54%) scale(0);
      width:108px;
      height:108px;
      transition:1.45s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    .petal{
      position:absolute;
      left:50%;
      top:50%;
      width:42px;
      height:68px;
      background:linear-gradient(to bottom, #ffd4e5, #ff79a8);
      border-radius:50% 50% 50% 50% / 80% 80% 20% 20%;
      transform-origin:bottom center;
      box-shadow:inset 0 0 10px rgba(255,255,255,.18);
    }

    .p1{ transform:translate(-50%, -100%) rotate(0deg); }
    .p2{ transform:translate(-50%, -100%) rotate(72deg); }
    .p3{ transform:translate(-50%, -100%) rotate(144deg); }
    .p4{ transform:translate(-50%, -100%) rotate(216deg); }
    .p5{ transform:translate(-50%, -100%) rotate(288deg); }

    .flower-center{
      position:absolute;
      left:50%;
      top:50%;
      width:24px;
      height:24px;
      border-radius:50%;
      transform:translate(-50%, -50%);
      background:#ffeb3b;
      box-shadow:0 0 16px rgba(255,235,59,.55);
    }

    #final-message{
      position:absolute;
      left:50%;
      bottom:10%;
      width:min(92%, 520px);
      transform:translateX(-50%);
      color:#fff;
      text-align:center;
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:1.08rem;
      line-height:1.8;
      opacity:0;
      transition:2s ease;
      z-index:3;
      text-shadow:0 2px 14px rgba(0,0,0,.35);
    }

    #final-sub{
      margin-top:14px;
      font-family:'Montserrat',sans-serif;
      font-style:normal;
      font-size:.98rem;
      color:rgba(255,255,255,.85);
      line-height:1.7;
    }

    .show-scene{ display:flex !important; }
    .grow-stem{ height:75% !important; }
    .bloom{ transform:translate(-50%, 54%) scale(1) !important; }
    .show-leaf{ opacity:1 !important; transform:scale(1) !important; }
    .fade-in{ opacity:1 !important; }

    .sparkle{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
      opacity:.65;
      animation:twinkle 2.8s ease-in-out infinite;
      filter:blur(.2px);
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(.7); opacity:.25; }
      50%{ transform:scale(1.3); opacity:.95; }
    }

    @media (max-width:480px){
      #intro-card{
        padding:34px 22px 28px;
      }

      #intro-card h1{
        font-size:1.85rem;
      }

      #final-message{
        font-size:1rem;
      }

      .garden{
        height:58vh;
        margin-bottom:34px;
      }

      .flower{
        width:78px;
        margin:0 8px;
      }
    }
  </style>
</head>
<body>

  <div id="canvas-petals"></div>

  <div id="intro-card" aria-label="Pesan pembuka">
    <div class="mini-badge">UNTUK AURA</div>
    <h1>Hai, Aura</h1>
    <p>Aku cuma ingin menyampaikan pesan kecil untuk kamu.</p>
    <p>Semoga hari-harimu terasa cukup baik, dan kalau sedang capek, semoga ada waktu untuk istirahat sebentar.</p>
    <p class="hint">Ada bunga kecil di balik tombol ini.</p>
    <button class="btn-start" id="btnKlik">Buka pesannya</button>
  </div>

  <div id="flower-scene" aria-label="Adegan bunga">
    <div class="garden">
      <div class="flower">
        <div class="stem" id="s1">
          <div class="leaf l1"></div>
          <div class="leaf l2"></div>
        </div>
        <div class="flower-head" id="h1">
          <div class="petal p1"></div>
          <div class="petal p2"></div>
          <div class="petal p3"></div>
          <div class="petal p4"></div>
          <div class="petal p5"></div>
          <div class="flower-center"></div>
        </div>
      </div>

      <div class="flower">
        <div class="stem" id="s2">
          <div class="leaf l1"></div>
          <div class="leaf l2"></div>
        </div>
        <div class="flower-head" id="h2">
          <div class="petal p1"></div>
          <div class="petal p2"></div>
          <div class="petal p3"></div>
          <div class="petal p4"></div>
          <div class="petal p5"></div>
          <div class="flower-center"></div>
        </div>
      </div>

      <div class="flower">
        <div class="stem" id="s3">
          <div class="leaf l1"></div>
          <div class="leaf l2"></div>
        </div>
        <div class="flower-head" id="h3">
          <div class="petal p1"></div>
          <div class="petal p2"></div>
          <div class="petal p3"></div>
          <div class="petal p4"></div>
          <div class="petal p5"></div>
          <div class="flower-center"></div>
        </div>
      </div>
    </div>

    <div id="final-message">
      <div id="typedText"></div>
      <div id="final-sub"></div>
    </div>
  </div>

  <script>
    const petalContainer = document.getElementById("canvas-petals");

    function spawnPetal() {
      const p = document.createElement("div");
      p.className = "sakura";
      const size = Math.random() * 10 + 10;
      p.style.left = Math.random() * 100 + "vw";
      p.style.width = size + "px";
      p.style.height = size + "px";
      p.style.animationDuration = (Math.random() * 3 + 4) + "s";
      p.style.animationDelay = (Math.random() * 1.5) + "s";
      petalContainer.appendChild(p);
      setTimeout(() => p.remove(), 8000);
    }

    function createSparkles() {
      const count = 14;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.animationDelay = (Math.random() * 3) + "s";
        s.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(s);
      }
    }

    createSparkles();
    setInterval(spawnPetal, 280);

    const message1 = "Aura, kalau suatu hari kamu punya banyak pikiran, atau sekadar ingin cerita, aku siap mendengarkan.";
    const message2 = "Tidak harus selalu dipendam sendiri. Pelan-pelan saja, tanpa perlu merasa terburu-buru.";
    const message3 = "Semoga hari-harimu tetap baik, dan semoga kamu selalu diberi ruang untuk merasa tenang.";

    function typeText(el, text, speed = 28) {
      return new Promise((resolve) => {
        let i = 0;
        el.textContent = "";
        const timer = setInterval(() => {
          el.textContent += text[i];
          i++;
          if (i >= text.length) {
            clearInterval(timer);
            resolve();
          }
        }, speed);
      });
    }

    const btn = document.getElementById("btnKlik");
    let started = false;

    btn.addEventListener("click", async () => {
      if (started) return;
      started = true;

      document.getElementById("intro-card").style.display = "none";
      const scene = document.getElementById("flower-scene");
      scene.classList.add("show-scene");

      setTimeout(() => {
        document.getElementById("s1").classList.add("grow-stem");
        setTimeout(() => document.getElementById("s2").classList.add("grow-stem"), 380);
        setTimeout(() => document.getElementById("s3").classList.add("grow-stem"), 760);

        setTimeout(() => {
          document.querySelectorAll(".leaf").forEach(l => l.classList.add("show-leaf"));
        }, 1450);

        setTimeout(() => document.getElementById("h1").classList.add("bloom"), 2100);
        setTimeout(() => document.getElementById("h2").classList.add("bloom"), 2480);
        setTimeout(() => document.getElementById("h3").classList.add("bloom"), 2860);

        setTimeout(async () => {
          const typed = document.getElementById("typedText");
          const sub = document.getElementById("final-sub");
          document.getElementById("final-message").classList.add("fade-in");

          await typeText(typed, message1, 26);
          sub.innerHTML = "<br>";
          await typeText(sub, message2, 24);
          sub.innerHTML += "<br><br>";
          await typeText(sub, message3, 24);
        }, 4300);
      }, 120);
    });
  </script>
</body>
</html>
